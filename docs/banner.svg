<svg width="800" height="200" viewBox="0 0 800 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="200" fill="#0b111e" rx="12"/>
  <rect width="800" height="200" fill="url(#bg-grad)" rx="12" opacity="0.6"/>

  <!-- Background Grid -->
  <path d="M 0,40 H 800 M 0,80 H 800 M 0,120 H 800 M 0,160 H 800" stroke="#111827" stroke-width="1"/>
  <path d="M 100,0 V 200 M 200,0 V 200 M 300,0 V 200 M 400,0 V 200 M 500,0 V 200 M 600,0 V 200 M 700,0 V 200" stroke="#111827" stroke-width="1"/>

  <!-- Neural Net Connections (left cluster) -->
  <g stroke="#1f2937" stroke-width="1.5">
    <line x1="60" y1="50" x2="130" y2="70"/>
    <line x1="60" y1="50" x2="100" y2="130"/>
    <line x1="130" y1="70" x2="180" y2="45"/>
    <line x1="100" y1="130" x2="180" y2="155"/>
    <line x1="180" y1="45" x2="260" y2="100"/>
    <line x1="180" y1="155" x2="260" y2="100"/>
    <!-- Highlighted center bridge -->
    <line x1="260" y1="100" x2="380" y2="100" stroke="#0ea5e9" stroke-width="2.5"/>
    <!-- Right cluster -->
    <line x1="420" y1="100" x2="380" y2="100" stroke="#22d3ee" stroke-width="2.5"/>
    <line x1="420" y1="100" x2="500" y2="55"/>
    <line x1="420" y1="100" x2="480" y2="148"/>
    <line x1="500" y1="55" x2="610" y2="70"/>
    <line x1="480" y1="148" x2="580" y2="162"/>
    <line x1="610" y1="70" x2="720" y2="120"/>
    <line x1="580" y1="162" x2="720" y2="120"/>
  </g>

  <!-- Neural Net Nodes -->
  <circle cx="60" cy="50" r="4" fill="#6b7280"/>
  <circle cx="130" cy="70" r="5" fill="#0ea5e9" opacity="0.8"/>
  <circle cx="100" cy="130" r="4" fill="#3b82f6"/>
  <circle cx="180" cy="45" r="6" fill="#a855f7"/>
  <circle cx="180" cy="155" r="5" fill="#7c3aed"/>
  <!-- Glowing hubs -->
  <circle cx="260" cy="100" r="9" fill="#0ea5e9" opacity="0.2"/>
  <circle cx="260" cy="100" r="6" fill="#0ea5e9"/>
  <circle cx="420" cy="100" r="9" fill="#22d3ee" opacity="0.2"/>
  <circle cx="420" cy="100" r="6" fill="#22d3ee"/>
  <!-- Right cluster nodes -->
  <circle cx="500" cy="55" r="4" fill="#6b7280"/>
  <circle cx="480" cy="148" r="5" fill="#ec4899"/>
  <circle cx="610" cy="70" r="6" fill="#10b981"/>
  <circle cx="580" cy="162" r="4" fill="#f59e0b"/>
  <circle cx="720" cy="120" r="5" fill="#22d3ee"/>

  <!-- Text: DEVMIND -->
  <text x="400" y="82" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="5px">DEVMIND</text>

  <!-- Tagline -->
  <text x="400" y="114" font-family="monospace" font-size="11" font-weight="600" fill="#0ea5e9" text-anchor="middle" letter-spacing="7px">AI CODE INTELLIGENCE ENGINE</text>

  <!-- Sub-tagline -->
  <text x="400" y="142" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#8892b0" text-anchor="middle" letter-spacing="1.5px">RAG GROUNDED SEMANTIC PIPELINE  •  MULTI-AGENT ARCHITECTURE</text>

  <!-- Phase badge -->
  <rect x="316" y="158" width="168" height="22" rx="4" fill="#0ea5e9" opacity="0.12"/>
  <rect x="316" y="158" width="168" height="22" rx="4" fill="none" stroke="#0ea5e9" stroke-width="1" opacity="0.5"/>
  <text x="400" y="173" font-family="monospace" font-size="9" font-weight="600" fill="#0ea5e9" text-anchor="middle" letter-spacing="2px">PHASE 5 — ENGINE COMPLETE</text>

  <!-- Gradient defs -->
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="800" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0.06"/>
    </linearGradient>
  </defs>
</svg>
